name: 📦 cargo publish

# Manual dispatch, DRY-RUN unless `publish: true`; publishes decmpfs via the fleet
# cargo-publish engine using crates.io Trusted Publishing (OIDC — id-token: write,
# no long-lived token) with build provenance. The `cargo-publish` CI environment
# gates the real, PERMANENT publish (crates.io is yank-only) — configure required
# reviewers + the crates.io trusted-publisher (repo + this workflow + environment)
# on it. workflow_dispatch-only: the `inputs` context is valid here (a `release`
# trigger doesn't populate it — that mismatch startup-failed the old version).

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish for real (false = dry-run, the default).'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Same-named CI environment: the human-approval + OIDC gate for the
    # PERMANENT publish; a dry-run is ungated.
    environment: ${{ inputs.publish == true && 'cargo-publish' || '' }}
    permissions:
      contents: write # cargo-publish.mts tags + cuts the GitHub release
      id-token: write # crates.io Trusted Publishing (OIDC) + provenance
      attestations: write # build provenance for the .crate
    env:
      SOCKET_API_KEY: ${{ secrets.SOCKET_API_TOKEN_FOR_CLI_AND_SFW }}
    steps:
      # Bootstrap checkout ONLY to put ./.github/actions/* on disk so the local
      # setup-and-install composite resolves. persist-credentials: false is
      # required — setup-and-install does its own git auth, and a token persisted
      # here conflicts with it and 400s the fetch.
      - name: Checkout (bootstrap)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (2026-05-15)
        with:
          persist-credentials: false
      - name: Setup + install
        uses: ./.github/actions/fleet/setup-and-install
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: crates.io auth (OIDC Trusted Publishing)
        id: auth
        if: ${{ inputs.publish == true }}
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          GH_TOKEN: ${{ github.token }}
        run: node scripts/fleet/cargo-publish.mts ${{ inputs.publish == true && '--direct' || '--staged --dry-run' }}
      - name: Attest build provenance (.crate)
        if: ${{ inputs.publish == true }}
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: target/package/*.crate
