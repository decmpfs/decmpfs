name: 📦 Publish to npm

# Dependencies: none — self-contained.
#
# The publish step is INLINED (not delegated to a reusable workflow) because npm
# OIDC trusted publishing keys on the workflow file that contains the publish step:
# `job_workflow_ref` must be a stable
# decmpfs/decmpfs/.github/workflows/publish-npm.yml@<ref> for the trusted-publisher
# config to match. (socket-addon delegates to socket-registry's reusable, but that
# is Socket infra; decmpfs is independent, so it follows socket-lib's inlined
# pattern.)
#
# These are addons (a `.node` dlopen'd into Node), so each platform builds on its
# own matrix host, then the publish job publishes every @decmpfs/<triple> package
# plus the main `decmpfs` package with provenance.

on:
  # Publishing a GitHub Release (github-release.yml, on a vX.Y.Z tag) triggers a
  # real publish at the `latest` dist-tag. workflow_dispatch stays for manual
  # dry-run testing and non-latest dist-tags.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (default: true)'
        required: false
        default: true
        type: boolean
      dist-tag:
        description: 'npm dist-tag (latest, next, beta, …)'
        required: false
        default: latest
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Don't cancel publishing.

# No-phone-home posture: every tool this workflow touches runs telemetry-off.
env:
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
  COREPACK_ENABLE_PROJECT_SPEC: '0'
  DISABLE_TELEMETRY: '1'
  DO_NOT_TRACK: '1'
  NO_UPDATE_NOTIFIER: '1'

jobs:
  build:
    name: Build ${{ matrix.triple }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - { triple: darwin-arm64, runner: macos-14 }
          - { triple: darwin-x64, runner: macos-15-intel }
          - { triple: linux-x64-gnu, runner: ubuntu-latest }
          - { triple: linux-arm64-gnu, runner: ubuntu-24.04-arm }
          - { triple: win32-x64-msvc, runner: windows-latest }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (2026-06-29)
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (2026-06-29)
        with:
          node-version: 24
      # Build + test the addon directly — no node dependencies needed (node
      # strips the .mts scripts/tests). The .d.cts type-check runs in CI's
      # typecheck job, not per-publish-platform.
      - name: Build addon
        working-directory: napi/decmpfs
        run: node scripts/build.mts
      - name: Test addon
        working-directory: napi/decmpfs
        run: node --test
      - name: Assemble platform package
        working-directory: napi/decmpfs
        run: node scripts/make-npm-dirs.mts
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 (2026-06-29)
        with:
          name: ${{ matrix.triple }}
          path: napi/decmpfs/npm/${{ matrix.triple }}/
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Real publishes run in the `release` environment (reviewer gate + a tighter
    # OIDC trusted-publisher match); only a manual dry-run dispatch skips it.
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry-run == 'true') && '' || 'release' }}
    permissions:
      # Needed for npm provenance via OIDC trusted publishing.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (2026-06-29)
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (2026-06-29)
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - name: Check crate + npm versions agree
        run: node scripts/check-versions.mts
      - uses: ./.github/actions/setup-sfw
      - name: Use a trusted-publishing-capable npm
        run: '"$SFW_BIN" npm install --global npm@latest'
      - name: Download platform packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1 (2026-06-29)
        with:
          path: napi/decmpfs/npm
      - name: Publish
        working-directory: napi/decmpfs
        env:
          # Release-triggered = real publish at `latest`; manual dispatch honors its inputs.
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || 'false' }}
          DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.dist-tag || 'latest' }}
        run: |
          set -euo pipefail
          ARGS="--access public --tag ${DIST_TAG:-latest}"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          # Publish one package dir, idempotently: skip a version already on the
          # registry so a re-run after a mid-list failure completes the remaining
          # packages instead of 403-aborting on the first (mirrors the crate flow).
          # The `npm view` doubles as the pre-publish registry-read receipt.
          # Leading ./ is load-bearing: npm parses a bare `a/b` arg as a GitHub
          # git spec, not a folder.
          publish_one() {
            dir="$1"
            name="$(node -p "require('${dir}/package.json').name")"
            version="$(node -p "require('${dir}/package.json').version")"
            if [ "$DRY_RUN" != "true" ] && npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "skip: ${name}@${version} already published"
              return 0
            fi
            npm publish "$dir" $ARGS
          }
          # Platform packages first, then the main package that depends on them.
          for dir in npm/*/; do
            publish_one "./$dir"
          done
          publish_one .
