<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>deCMPfs wordmark — 3 variants</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0b0b0d;color:#e6e8ec;font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1000px;margin:0 auto;padding:36px 24px 80px}
  h1{font-size:24px;margin:0 0 4px}
  .sub{color:#9aa3b2;margin:0 0 28px}
  .variant{margin:0 0 26px;border:1px solid #23262e;border-radius:14px;overflow:hidden}
  .vhead{padding:10px 16px;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:#9aa3b2;background:#14151a;border-bottom:1px solid #23262e}
  .rows{display:grid;grid-template-columns:1fr 1fr}
  .rows>div{display:flex;align-items:center;justify-content:center;padding:38px 28px;min-height:150px}
  .dark{background:#0d0d0f}
  .light{background:#faf7f2}
  img{height:88px;width:auto}
  .tall img{height:112px}
  code{font-family:ui-monospace,Menlo,Consolas,monospace;background:#141922;border:1px solid #23262e;border-radius:5px;padding:1px 5px;font-size:12.5px}
</style>
</head>
<body>
<div class="wrap">
  <h1>deCMPfs wordmark — 3 variants</h1>
  <p class="sub">Hand-authored SVG shapes (not a font). Middle size-arc, <code>fs</code> in <code>#f15a24</code>. Each variant in light + dark.</p>

  <div class="variant">
    <div class="vhead">1 — logo (no branding)</div>
    <div class="rows">
      <div class="dark"><img src="decmpfs-logo-dark.svg" alt="deCMPfs dark"></div>
      <div class="light"><img src="decmpfs-logo-light.svg" alt="deCMPfs light"></div>
    </div>
  </div>

  <div class="variant">
    <div class="vhead">2 — for rust</div>
    <div class="rows tall">
      <div class="dark"><img src="decmpfs-for-rust-dark.svg" alt="deCMPfs for rust dark"></div>
      <div class="light"><img src="decmpfs-for-rust-light.svg" alt="deCMPfs for rust light"></div>
    </div>
  </div>

  <div class="variant">
    <div class="vhead">3 — for npm</div>
    <div class="rows tall">
      <div class="dark"><img src="decmpfs-for-npm-dark.svg" alt="deCMPfs for npm dark"></div>
      <div class="light"><img src="decmpfs-for-npm-light.svg" alt="deCMPfs for npm light"></div>
    </div>
  </div>
</div>
</body>
</html>
