packages:
  - napi/*
  - napi/decmpfs/npm/*
  - '.config/fleet/oxlint-plugin'
  - '.config/fleet/oxlint-plugin/fleet/*'
  - '.claude/hooks/fleet/*'
trustPolicy: no-downgrade
minimumReleaseAge: 10080
blockExoticSubdeps: true
confirmModulesPurge: false
managePackageManagerVersions: false
pmOnFail: warn
linkWorkspacePackages: true
# Pinned dev-tool versions shared via `catalog:` references in package.json.
catalog:
  '@redwoodjs/agent-ci': 0.17.1
  '@resvg/resvg-wasm': 2.6.2
  '@sinclair/typebox': 0.34.52
  '@socketregistry/packageurl-js': 1.4.6
  '@socketregistry/packageurl-js-stable': npm:@socketregistry/packageurl-js@1.4.6
  '@socketsecurity/lib': 6.2.3
  '@socketsecurity/lib-stable': npm:@socketsecurity/lib@6.2.3
  '@socketsecurity/registry': 2.0.2
  '@socketsecurity/registry-stable': npm:@socketsecurity/registry@2.0.2
  '@socketsecurity/sdk': 4.0.2
  '@socketsecurity/sdk-stable': npm:@socketsecurity/sdk@4.0.2
  '@types/mdast': 4.0.4
  '@types/node': 26.1.1
  '@types/semver': 7.7.1
  '@types/shell-quote': 1.7.5
  '@ultrathink/acorn.wasm': npm:@ultrathink/acorn-wasm@0.0.1
  '@vitest/coverage-v8': 4.1.10
  '@vitest/ui': 4.1.10
  'c8': 12.0.0
  'chrome-devtools-mcp': 1.6.0
  'compromise': 14.16.0
  'dtu-github-actions': 0.17.1
  'fast-check': 4.9.0
  'magic-string': 1.0.0
  'markdownlint-cli2': 0.23.0
  'mdast-util-from-markdown': 2.0.3
  'micromark': 4.0.2
  'neosanitize': 0.3.0
  'nock': 15.0.0
  'oxfmt': 0.59.0
  'oxlint': 1.74.0
  # oxlint-tsgolint — the type-aware lint sidecar the fleet lint runner's
  # whole-tree gate invokes via `oxlint --type-aware`. Exact-pinned to match
  # the wheelhouse catalog; the per-platform binaries are soak-excluded
  # transitives (consumers depend on `oxlint-tsgolint` only).
  'oxlint-tsgolint': 7.0.2001
  'playwright-core': 1.61.1
  'portless': 0.15.4
  'regjsparser': 0.13.2
  # rolldown — bundles .claude/hooks/fleet into _dist/bundle.cjs via
  # scripts/fleet/build-hook-bundle.mts. Pin matches the wheelhouse
  # catalogOptional entry; the per-platform @rolldown/binding-* stay as
  # soak-excluded transitives (consumers depend on `rolldown` only).
  'rolldown': 1.1.4
  'semver': 7.8.5
  'shell-quote': 1.10.0
  svgo: 4.0.1
  'taze': 19.16.0
  typescript: 7.0.2
  'vitest': 4.1.10

overrides:
  # Fleet-canonical overrides (managed by socket-wheelhouse sync; do not edit).
  '@socketregistry/packageurl-js': 'catalog:'
  '@socketsecurity/lib': 'catalog:'
  '@socketsecurity/registry': 'catalog:'
  '@socketsecurity/sdk': 'catalog:'
  'chalk@>=5': '5.6.2'
  'es-define-property': 'npm:@socketregistry/es-define-property@1.0.7'
  'es-set-tostringtag': 'npm:@socketregistry/es-set-tostringtag@1.0.10'
  'function-bind': 'npm:@socketregistry/function-bind@1.0.7'
  'glob': '13.0.6'
  'gopd': 'npm:@socketregistry/gopd@1.0.7'
  'has-symbols': 'npm:@socketregistry/has-symbols@1.0.7'
  'has-tostringtag': 'npm:@socketregistry/has-tostringtag@1.0.7'
  'hasown': 'npm:@socketregistry/hasown@1.0.7'
  'iconv-lite': '0.7.2'
  'isexe@>=3': '4.0.0'
  'lru-cache@>=10': '11.3.6'
  'magic-string': '1.0.0'
  'mime-db': '1.54.0'
  'mime-types@>=3': '3.0.2'
  'minipass@>=4': '7.1.3'
  'safe-buffer': 'npm:@socketregistry/safe-buffer@1.0.9'
  'safer-buffer': 'npm:@socketregistry/safer-buffer@1.0.10'
  'semver@>=5.0.0 <7.6.0': '7.8.1'
  'side-channel': 'npm:@socketregistry/side-channel@1.0.10'
  'ssri@>=12': '13.0.1'
  'string-width@>=5': '8.1.0'
  'update-notifier@>=4.0.0': '7.3.1'
  'uuid': '11.1.1'
  'which': '7.0.0'
  'wrap-ansi@>=8': '9.0.2'
  'yaml@2': '2.9.0'

patchedDependencies:
  # single-registry: routes taze version resolution through its own bundled
  # direct-registry client for EVERY registry, instead of the fast-npm-meta
  # hosted endpoint it uses when the registry is the npm default. Patch file
  # ships in the fleet bundle; the pin above must track its version.
  # TEMPORARY: remove if taze grows a supported flag to force direct-registry
  # resolution (or we swap to our own metadata client, see socket-lib plan).
  taze@19.16.0: patches/taze@19.16.0.patch

minimumReleaseAgeExclude:
  - '@sdxgen/*'
  - '@socketoverride/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'
  - '@stuie/*'
  - '@ultrathink/*'
  - 'sdxgen'
  - 'sfw'
  - 'socket'
  - 'stuie'
  # published: 2026-07-16 | removable: 2026-07-23
  - 'magic-string@1.0.0'
  # published: 2026-07-16 | removable: 2026-07-23
  - 'portless@0.15.4'
  # taze 19.16.0 — the dep updater itself; forced ahead of the soak by owner
  # directive so the regenerated single-registry patch (patchedDependencies)
  # tracks the current release. Exact-pinned so a future version re-soaks.
  # published: 2026-07-22 | removable: 2026-07-29
  - 'taze@19.16.0'
  # verkit — new dev-only transitive of taze 19.16.0 (same owner directive);
  # exact-pinned so future versions re-soak.
  # published: 2026-07-19 | removable: 2026-07-26
  - 'verkit@0.1.2'
  # oxlint-tsgolint 7.0.2001 — the type-aware lint sidecar the fleet lint
  # runner's whole-tree gate needs. The main package + its per-platform binary
  # family are pinned to the exact version (a scope glob would blanket-bypass a
  # future publish); exact-pinned so a future version re-soaks.
  # published: 2026-07-21 | removable: 2026-07-28
  - 'oxlint-tsgolint@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/darwin-arm64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/darwin-x64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/linux-arm64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/linux-x64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/win32-arm64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/win32-x64@7.0.2001'

allowBuilds:
  '@socketsecurity/sdk': false
  cpu-features: false
  protobufjs: false
  puppeteer: false
  ssh2: false
